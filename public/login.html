<!DOCTYPE html>
<html>
<head>
  <title>RFID Tracker Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* BACKGROUND IMAGE */
      background: url('hospital.jpg') no-repeat center center fixed;
      background-size: cover;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* DARK OVERLAY */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      top: 0;
      left: 0;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 1;

      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* LOGO */
    .logo {
      width: 130px;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 5px;
      color: #333;
      font-size: 22px;
    }

    .subtitle {
      font-size: 13px;
      color: gray;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #3a8de0;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <!-- ✅ YOUR LOGO -->
    <img src="hospitallogo.png" class="logo">

    <h1>Hospital Login</h1>
    <div class="subtitle">RFID Asset Tracking System</div>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

  <script src="login.js"></script>

</body>
</html>
