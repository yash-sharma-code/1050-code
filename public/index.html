<!DOCTYPE html>
<html>
<head>
  <title>Hospital Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Hospital Asset Tracking</h1>

<h3 id="roleDisplay"></h3>

<button onclick="logout()">Logout</button>

<input id="search" placeholder="Search asset..." oninput="searchAsset()">

<div class="map-container">
  <img src="floor.png" class="map">
  <div id="map-assets"></div>
</div>

<h3>Legend</h3>
<div class="legend">
  <div><span class="box pump"></span> IV Pump</div>
  <div><span class="box wheelchair"></span> Wheelchair</div>
  <div><span class="box ultrasound"></span> Ultrasound</div>
</div>

<div id="analytics"></div>

<h3>History</h3>
<div id="history"></div>

<script src="script.js"></script>

</body>
</html>
