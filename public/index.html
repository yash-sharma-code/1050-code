<!DOCTYPE html>
<html>
<head>
  <title>RFID Asset Tracking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #roleDisplay {
      margin-bottom: 10px;
      font-weight: bold;
    }

    button {
      padding: 8px 15px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      background: #4facfe;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3a8de0;
    }

    input {
      padding: 8px;
      width: 200px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    /* ---------------- MAP ---------------- */

    .map-container {
      position: relative;
      width: 800px;
      margin: 20px auto;
    }

    .map {
      width: 100%;
      border-radius: 10px;
    }

    #map div {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 12px;
    }

    /* ---------------- PANELS ---------------- */

    #analytics, #adminPanel {
      background: white;
      margin: 20px auto;
      padding: 15px;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: left;
    }

    #history p {
      margin: 5px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Hospital Asset Tracking</h1>

  <div id="roleDisplay"></div>

  <button onclick="logout()">Logout</button>

  <br>

  <input id="search" placeholder="Search asset..." oninput="searchAsset()">

  <!-- ---------------- MAP ---------------- -->

  <div class="map-container">
    <img src="floor.png" class="map">
    <div id="map"></div>
  </div>

  <!-- ---------------- ANALYTICS (ENGINEER + ADMIN) ---------------- -->

  <div id="analytics"></div>

  <!-- ---------------- ADMIN PANEL ---------------- -->

  <div id="adminPanel" style="display:none;">
    <h3>Admin Panel</h3>
    <button onclick="resetSystem()">Reset System</button>

    <div id="history"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
